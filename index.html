<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HTML Quiz</title>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <div id="quiz-wrap">
            <div id="box">
                <div id="quiz-section">
                    <div id="head-row">
                        <div id="quiz-name-label">Quizz App</div>
                        <div>
                            <div id="tmr-val">60</div>
                            <div id="tmr-sec">seconds</div>
                        </div>
                    </div>
                    <div id="prog-bar">
                        <div id="prog-fill" style="width:12.5%"></div>
                    </div>
                    <div id="q-counter-badge">Question 1 of 8</div>
                    <p id="q-text"></p>
                    <div id="opts-list"></div>
                    <div id="fb-text"></div>
                    <div id="nav-row"><button id="next-btn" disabled onclick="nextQ()">Next &rarr;</button></div>
                </div>
                <div id="result-wrap">
                    <div id="res-score">0</div>
                    <div id="res-outof">out of 8</div>
                    <div id="res-msg"></div>
                    <div id="res-sub"></div>
                    <div id="res-stats">
                        <div>
                            <div class="r-stat-val" id="s-cor" style="color:#1abc9c">0</div>
                            <div class="r-stat-lbl">Correct</div>
                        </div>
                        <div>
                            <div class="r-stat-val" id="s-wrg" style="color:#e74c3c">0</div>
                            <div class="r-stat-lbl">Wrong</div>
                        </div>
                        <div>
                            <div class="r-stat-val" id="s-pct" style="color:#fff">0%</div>
                            <div class="r-stat-lbl">Score</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="app.js"></script>
    </body>
</html>
